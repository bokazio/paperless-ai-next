name: Docker Nightly Full Pipeline

env:
  DOCKERHUB_REPO: admonstrator/paperless-ai-next

on:
  workflow_dispatch:
    inputs:
      build_arm64:
        description: 'Also build ARM64 (slower, more expensive)'
        required: false
        default: false
        type: boolean
      build_lite_base:
        description: 'Build/push nightly base image'
        required: false
        default: true
        type: boolean
      build_lite_app:
        description: 'Build/push nightly app image'
        required: false
        default: true
        type: boolean

concurrency:
  group: docker-nightly-all
  cancel-in-progress: true

jobs:
  validate-options:
    name: Validate Nightly Inputs
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'nightly' }}

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Validate base/app build dependencies
        run: |
          if [ "${{ inputs.build_lite_app }}" = "true" ] && [ "${{ inputs.build_lite_base }}" != "true" ]; then
            echo "App requested without base rebuild. Checking existing nightly-base tag..."
            if ! docker buildx imagetools inspect "${{ env.DOCKERHUB_REPO }}:nightly-base" >/dev/null 2>&1; then
              echo "Invalid inputs: build_lite_app=true needs either build_lite_base=true or existing image ${{ env.DOCKERHUB_REPO }}:nightly-base"
              exit 1
            fi
          fi

  build-base-lite:
    name: Build Nightly Lite Base
    runs-on: ubuntu-latest
    needs: [validate-options]
    if: ${{ github.ref_name == 'nightly' && inputs.build_lite_base }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Nightly Lite Base Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.base
          push: true
          tags: ${{ env.DOCKERHUB_REPO }}:nightly-base
          platforms: ${{ inputs.build_arm64 && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_REPO }}:buildcache-base-nightly
          cache-to: type=registry,ref=${{ env.DOCKERHUB_REPO }}:buildcache-base-nightly,mode=min
        timeout-minutes: 60

  build-app-lite:
    name: Build Nightly App
    runs-on: ubuntu-latest
    needs: [validate-options, build-base-lite]
    if: ${{ github.ref_name == 'nightly' && inputs.build_lite_app && ((inputs.build_lite_base && needs.build-base-lite.result == 'success') || !inputs.build_lite_base) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set version in config.js for image build
        run: |
          sed -i "s|PAPERLESS_AI_VERSION: '.*'|PAPERLESS_AI_VERSION: 'nightly'|" config/config.js

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Nightly Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.DOCKERHUB_REPO }}:nightly-base
            PAPERLESS_AI_COMMIT_SHA=${{ github.sha }}
          push: true
          tags: ${{ env.DOCKERHUB_REPO }}:nightly
          platforms: ${{ inputs.build_arm64 && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_REPO }}:buildcache-app-nightly
          cache-to: type=registry,ref=${{ env.DOCKERHUB_REPO }}:buildcache-app-nightly,mode=min
        timeout-minutes: 45
